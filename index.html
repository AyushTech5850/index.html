<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Spin Wheel</title>

<style>

body{
font-family:Arial;
background:#0f0f18;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:15px;
}

#wheel{
border-radius:50%;
box-shadow:0 0 40px rgba(0,0,0,0.8);
}

.pointer{
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:30px solid #ffd600;
margin:auto;
}

.controls{
margin-top:15px;
}

input{
padding:8px;
border-radius:6px;
border:none;
margin:4px;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.itemRow{
margin:5px;
}

.removeBtn{
background:#ff5252;
margin-left:5px;
}

.weight{
width:50px;
}

#winnerPopup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
font-size:40px;
}

</style>

</head>

<body>

<h1>🎡 Pro Spin Wheel</h1>

<div class="pointer"></div>

<canvas id="wheel" width="420" height="420"></canvas>

<div class="controls">

<input id="nameInput" placeholder="Item">
<input id="weightInput" type="number" value="1" class="weight">

<button onclick="addItem()">Add</button>

<button onclick="spin()">SPIN</button>

</div>

<div id="itemsList"></div>

<div id="winnerPopup" onclick="closePopup()"></div>

<script>

let items=JSON.parse(localStorage.getItem("wheelItems"))||[
{name:"Apple",weight:1},
{name:"Banana",weight:1},
{name:"Orange",weight:1}
];

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

let angle=0;
let velocity=0;

const colors=[
"#ff5252","#ff9800","#ffeb3b",
"#4caf50","#03a9f4","#9c27b0",
"#e91e63","#00bcd4"
];

const tick=new Audio(
"https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"
);

function totalWeight(){
return items.reduce((sum,i)=>sum+i.weight,0);
}

function drawWheel(){

ctx.clearRect(0,0,420,420);

let start=angle;
let total=totalWeight();

items.forEach((item,i)=>{

let slice=(item.weight/total)*2*Math.PI;

ctx.beginPath();
ctx.moveTo(210,210);
ctx.arc(210,210,210,start,start+slice);

let grad=ctx.createLinearGradient(0,0,420,420);
grad.addColorStop(0,colors[i%colors.length]);
grad.addColorStop(1,"#000");

ctx.fillStyle=grad;
ctx.fill();

ctx.save();
ctx.translate(210,210);
ctx.rotate(start+slice/2);
ctx.fillStyle="white";
ctx.textAlign="right";
ctx.font="16px Arial";
ctx.fillText(item.name,190,5);
ctx.restore();

start+=slice;

});

}

function spin(){

velocity=Math.random()*0.4+0.45;

animate();

}

function animate(){

angle+=velocity;

velocity*=0.992;

drawWheel();

tick.currentTime=0;
tick.play();

if(velocity>0.002){

requestAnimationFrame(animate);

}else{

finish();

}

}

function finish(){

let total=totalWeight();

let normalized=angle%(2*Math.PI);

let accum=0;

for(let item of items){

let slice=(item.weight/total)*2*Math.PI;

if(normalized<accum+slice){

showWinner(item.name);
break;

}

accum+=slice;

}

}

function showWinner(name){

let popup=document.getElementById("winnerPopup");

popup.innerHTML="🏆 "+name+" 🏆";

popup.style.display="flex";

confetti();

}

function closePopup(){
document.getElementById("winnerPopup").style.display="none";
}

function addItem(){

let name=document.getElementById("nameInput").value;
let weight=parseInt(document.getElementById("weightInput").value);

if(!name||weight<=0) return;

items.push({name,weight});

save();

}

function removeItem(i){

items.splice(i,1);

save();

}

function save(){

localStorage.setItem("wheelItems",JSON.stringify(items));

renderItems();

drawWheel();

}

function renderItems(){

let list=document.getElementById("itemsList");

list.innerHTML="";

items.forEach((item,i)=>{

let div=document.createElement("div");

div.className="itemRow";

div.innerHTML=
item.name+" (x"+item.weight+")"+
` <button class="removeBtn" onclick="removeItem(${i})">Remove</button>`;

list.appendChild(div);

});

}

function confetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.style.position="fixed";
c.style.left=Math.random()*100+"vw";
c.style.top="-10px";
c.style.width="8px";
c.style.height="8px";
c.style.background=colors[Math.floor(Math.random()*colors.length)];
c.style.transition="3s";

document.body.appendChild(c);

setTimeout(()=>{
c.style.transform="translateY(100vh) rotate(720deg)";
},10);

setTimeout(()=>c.remove(),3000);

}

}

renderItems();
drawWheel();

</script>

</body>
</html>
