<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Spin Wheel Picker</title>

<style>

body{
font-family:Arial;
background:#121212;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

#wheel{
margin-top:20px;
border-radius:50%;
box-shadow:0 0 30px rgba(0,0,0,0.7);
}

.pointer{
width:0;
height:0;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:30px solid yellow;
margin:auto;
}

.controls{
margin-top:20px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#result{
font-size:24px;
margin-top:20px;
color:#ffd600;
}

#history{
margin-top:20px;
font-size:14px;
}

</style>

</head>

<body>

<h1>🎡 Advanced Spin Wheel</h1>

<div class="pointer"></div>

<canvas id="wheel" width="400" height="400"></canvas>

<div class="controls">

<input id="itemInput" placeholder="Add item">
<button onclick="addItem()">Add</button>

<button onclick="spin()">SPIN</button>

<button onclick="shareWheel()">Share Wheel</button>

</div>

<div id="result"></div>

<div id="history"></div>

<script>

let items = JSON.parse(localStorage.getItem("wheelItems")) || ["Apple","Banana","Orange"];

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

let startAngle=0;

const colors=[
"#ff5252","#ff9800","#ffeb3b",
"#4caf50","#03a9f4","#9c27b0",
"#e91e63","#00bcd4"
];

function drawWheel(){

let slice=2*Math.PI/items.length;

ctx.clearRect(0,0,400,400);

items.forEach((item,i)=>{

let angle=startAngle+i*slice;

ctx.beginPath();
ctx.moveTo(200,200);
ctx.arc(200,200,200,angle,angle+slice);

ctx.fillStyle=colors[i%colors.length];
ctx.fill();

ctx.save();
ctx.translate(200,200);
ctx.rotate(angle+slice/2);
ctx.fillStyle="#000";
ctx.textAlign="right";
ctx.font="16px Arial";
ctx.fillText(item,180,5);
ctx.restore();

});

}

drawWheel();

function spin(){

let random=Math.floor(Math.random()*items.length);

let spins=10;

let finalAngle=(2*Math.PI/items.length)*random;

let totalRotation=spins*2*Math.PI + finalAngle;

let start=null;

function animate(time){

if(!start) start=time;

let progress=(time-start)/4000;

if(progress>1) progress=1;

startAngle=totalRotation*progress;

drawWheel();

if(progress<1){

requestAnimationFrame(animate);

}else{

showWinner(items[random]);

}

}

requestAnimationFrame(animate);

}

function showWinner(name){

document.getElementById("result").innerHTML="Winner: "+name;

let history=document.getElementById("history");

history.innerHTML="Last winner: "+name+"<br>"+history.innerHTML;

confetti();

}

function addItem(){

let input=document.getElementById("itemInput");

if(!input.value) return;

items.push(input.value);

localStorage.setItem("wheelItems",JSON.stringify(items));

input.value="";

drawWheel();

}

function shareWheel(){

let link=location.origin+"?items="+items.join(",");

navigator.clipboard.writeText(link);

alert("Share link copied!");

}

function confetti(){

for(let i=0;i<100;i++){

let div=document.createElement("div");

div.style.position="fixed";
div.style.left=Math.random()*100+"vw";
div.style.top="-10px";
div.style.width="6px";
div.style.height="6px";
div.style.background=colors[Math.floor(Math.random()*colors.length)];
div.style.animation="fall 3s linear";

document.body.appendChild(div);

setTimeout(()=>div.remove(),3000);

}

}

</script>

</body>

</html>
